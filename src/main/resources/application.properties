spring.application.name=kafka-training

# ── R2DBC ─────────────────────────────────────────────────────────────────────
spring.r2dbc.url=r2dbc:postgresql://localhost:5432/orders_db
spring.r2dbc.username=postgres
spring.r2dbc.password=postgres

# ── Schema init ────────────────────────────────────────────────────────────────
spring.sql.init.mode=always

# ── Kafka ─────────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=io.confluent.kafka.serializers.KafkaAvroSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=io.confluent.kafka.serializers.KafkaAvroDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.properties.schema.registry.url=http://localhost:8081
spring.kafka.properties.specific.avro.reader=true
spring.kafka.properties.value.subject.name.strategy=io.confluent.kafka.serializers.subject.TopicRecordNameStrategy

# ── Crash simulation (NONE | AFTER_READ | AFTER_PROCESSING | AFTER_SAVE) ──────
payment.crash-simulation=NONE

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.net.davidschuld=INFO
